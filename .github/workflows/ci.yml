name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # action-setup reads the pnpm version from package.json's packageManager field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Same gates release.mjs enforces, run on every push and PR so type errors
      # and test/build failures surface here instead of at release time.
      - run: pnpm typecheck
      - run: pnpm -r test
      - run: pnpm build
