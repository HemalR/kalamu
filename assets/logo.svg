    <path d="M30 18 L30 84" />
    <path d="M42 45 L75 28" />
    <path d="M56 63 L79 77" />
  </g>
  <circle cx="30" cy="47" r="8" fill="#9a6a2e" />
  <rect x="39" y="54.5" width="15" height="15" rx="3.5" fill="none" stroke="#9a6a2e" stroke-width="6" />
</svg>
